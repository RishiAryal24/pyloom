{% load static %}
<!-- templates/_partials/_navbar.html -->
<nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top border-bottom">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'core:home' %}">
            {% if settings.logo %}
                <img src="{{ settings.logo.url }}" alt="PyLoom Logo" width="60" height="60" class="d-inline-block align-text-top me-3" loading="lazy">
            {% else %}
                <img src="{% static 'img/logo.svg' %}" alt="PyLoom Logo" width="60" height="60" class="d-inline-block align-text-top me-3" loading="lazy">
            {% endif %}
            <span class="fw-bold">
                <span class="pyloom-p">P</span><span class="pyloom-y">y</span><span class="pyloom-loom">Loom</span>
                <br>
                <span class="pyloom-technology" style="font-size: 0.7em; letter-spacing: 0.1em;">TECHNOLOGIES</span>
            </span>
        </a>
        
        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <!-- Navigation Links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'core:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'solutions' %}active{% endif %}" href="{% url 'core:solutions' %}">Solutions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'projects' %}active{% endif %}" href="{% url 'core:projects' %}">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'user_feedback' %}active{% endif %}" href="{% url 'core:user_feedback' %}">Feedback</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'articles' %}active{% endif %}" href="{% url 'core:articles' %}">Articles</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'events' %}active{% endif %}" href="{% url 'core:events' %}">Events Gallery</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="{% url 'core:about' %}">About Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="{% url 'core:contact' %}">Contact Us</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-sm btn-outline-primary d-inline-flex align-items-center gap-1 mt-2 mt-lg-0" href="https://pyloomtech.com/webmail" target="_blank" rel="noopener">
                        <i class="bi bi-envelope-at"></i>
                        Webmail
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
